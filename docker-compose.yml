services:
  demo-ms:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: demo-ms
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - JAVA_TOOL_OPTIONS=-XX:MaxRAMPercentage=75.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "512M"
        reservations:
          cpus: "0.5"
          memory: "256M"
