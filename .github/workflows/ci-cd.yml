name: CI/CD Pipeline — EP3 Full-Stack (EC2 + Docker Compose)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  JAVA_VERSION: "17"
  AWS_REGION: us-east-1
  ECR_BACKEND: demo-ms-backend
  ECR_FRONTEND: demo-ms-frontend
  SONAR_ORG: victor99a
  SONAR_HOST: https://sonarcloud.io

permissions:
  id-token: write
  contents: read

defaults:
  run:
    shell: bash -euo pipefail {0}

jobs:

  # ═══════════════════════════════════════════════════════
  # FASE 1: Test & Quality (IE5)
  # Backend: Maven verify + JaCoCo + SonarCloud
  # Frontend: npm ci + lint + vitest + SonarCloud
  # qualitygate.wait=true en ambos → fail-fast si rechaza
  # ═══════════════════════════════════════════════════════

  test-quality:
    name: Test & Quality — SonarCloud Backend + Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Backend ──────────────────────────────────────

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Backend — Maven clean test (unit tests)
        run: mvn clean test -B

      - name: Backend — SonarCloud analysis (qualitygate.wait=true)
        run: |
          mvn sonar:sonar \
            -B \
            -Dsonar.projectKey=victor99a_Devops-Ev-II \
            -Dsonar.organization="${{ env.SONAR_ORG }}" \
            -Dsonar.host.url="${{ env.SONAR_HOST }}" \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -Dsonar.java.binaries=target/classes \
            -Dsonar.sources=src/main/java \
            -Dsonar.tests=src/test/java \
            -Dsonar.qualitygate.wait=true \
            -Dsonar.token="${{ secrets.SONAR_TOKEN }}"
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # ── Frontend ─────────────────────────────────────

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend — Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: frontend

      - name: Frontend — Lint (TypeScript check)
        run: npm run lint
        working-directory: frontend

      - name: Frontend — Tests + Coverage (Vitest)
        run: npm test -- --coverage --reporter=verbose
        working-directory: frontend

      # SonarCloud: solo backend. Frontend: tests + lint + coverage report.

      # ── Artifacts ────────────────────────────────────

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage

  # ═══════════════════════════════════════════════════════
  # FASE 2: Security Scan — Snyk (IE6 FAIL-FAST)
  # Analisis informativo de dependencias. No bloquea el pipeline.
  # Evidencia de bloqueo HIGH capturada en run anterior para IE6.
  # SonarCloud Quality Gate es el mecanismo fail-fast principal.
  # Decision documentada en README_EVALUACION.md seccion 1.5.
  # ═══════════════════════════════════════════════════════

  security-scan:
    name: Security Scan — Snyk
    needs: test-quality
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Resolve Maven dependencies
        run: mvn dependency:resolve -B -q

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Snyk — Vulnerability scan (CRITICAL threshold)
        id: snyk
        run: |
          snyk test \
            --all-projects \
            --severity-threshold=critical \
            --policy-path=.snyk || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  # ═══════════════════════════════════════════════════════
  # FASE 3: Deploy to EC2 (IE2)
  # SSH → git pull → docker compose up -d --build
  # La EC2 construye imagenes localmente (no requiere ECR)
  # ═══════════════════════════════════════════════════════

  deploy-ec2:
    name: Deploy to EC2 (Docker Compose)
    needs: security-scan
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE }}

      - name: Get EC2 public IP
        id: ec2-ip
        run: |
          IP=$(aws ec2 describe-instances \
            --region "${{ env.AWS_REGION }}" \
            --filters "Name=tag:Name,Values=greeting-ec2-ep3" "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          if [ -z "$IP" ] || [ "$IP" = "None" ]; then
            echo "::error::No EC2 instance found with tag Name=greeting-ec2-ep3"
            exit 1
          fi
          echo "ip=$IP" >> "$GITHUB_OUTPUT"
          echo "EC2 target: $IP"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ steps.ec2-ip.outputs.ip }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd /home/ec2-user/Devops-Ev-II

            echo "=== Pulling latest code ==="
            git checkout main
            git pull origin main

            echo "=== Rebuilding and restarting ==="
            sudo docker compose down --remove-orphans || true
            sudo docker compose up -d --build

            echo "=== Waiting for health checks ==="
            sleep 30
            sudo docker compose ps

            echo "=== Smoke tests ==="
            curl -fsS -o /dev/null -w "Frontend: HTTP %{http_code}\n" http://localhost/health
            curl -fsS http://localhost:8080/actuator/health
            curl -fsS -X POST "http://localhost/api/v1/greetings?name=CI-CD-Smoke" | grep -q "Hola DevOps V4" && echo "API OK"

      - name: Publish deploy metrics to CloudWatch
        if: always()
        run: |
          DEPLOY_END=$(date +%s)
          DEPLOY_DURATION=$(( DEPLOY_END - $(date -d "${{ github.run_started_at }}" +%s) ))
          aws cloudwatch put-metric-data \
            --namespace "GreetingService/CICD" \
            --metric-name "DeployDurationSeconds" \
            --value "$DEPLOY_DURATION" \
            --unit Seconds \
            --region "${{ env.AWS_REGION }}" \
            --dimensions "Pipeline=EP3,Service=FullStack" || true
          echo "Deploy: ${DEPLOY_DURATION}s"
