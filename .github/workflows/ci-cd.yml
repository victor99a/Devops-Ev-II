name: CI/CD Pipeline — EP3 Full-Stack (EC2)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  JAVA_VERSION: "21"
  AWS_REGION: us-east-1
  ECR_BACKEND: demo-ms-backend
  ECR_FRONTEND: demo-ms-frontend

permissions:
  id-token: write
  contents: read

defaults:
  run:
    shell: bash -euo pipefail {0}

jobs:

  test-quality:
    name: Test & Quality (Backend + Frontend)
    runs-on: ubuntu-latest
    outputs:
      backend-jar: target/demo-ms-1.0.0.jar
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      # ── Backend ──────────────────────

      - name: Backend — Maven verify (tests + JaCoCo)
        id: backend-tests
        run: |
          set -euo pipefail
          mvn verify -B
        working-directory: .

      - name: Backend — Verify JaCoCo coverage threshold
        run: |
          set -euo pipefail
          COVERAGE_FILE="target/site/jacoco/jacoco.xml"
          if [ ! -f "$COVERAGE_FILE" ]; then
            echo "::error::JaCoCo report not found at $COVERAGE_FILE"
            exit 1
          fi
          echo "JaCoCo report verified"
        working-directory: .

      - name: Backend — SonarCloud analysis
        id: sonar-backend
        run: |
          set -euo pipefail
          mvn sonar:sonar \
            -Dsonar.projectKey=demo-ms-backend \
            -Dsonar.organization="${{ vars.SONAR_ORG }}" \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -Dsonar.qualitygate.wait=true \
            -B
        working-directory: .
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # ── Frontend ─────────────────────

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend — Install dependencies
        run: |
          set -euo pipefail
          npm ci
        working-directory: frontend

      - name: Frontend — Lint (TypeScript strict check)
        id: frontend-lint
        run: |
          set -euo pipefail
          npm run lint
        working-directory: frontend

      - name: Frontend — Tests with coverage (Vitest)
        id: frontend-tests
        run: |
          set -euo pipefail
          npm test -- --coverage --reporter=verbose
        working-directory: frontend

      - name: Frontend — Verify coverage report exists
        run: |
          set -euo pipefail
          if [ ! -f "coverage/lcov.info" ]; then
            echo "::error::Frontend coverage report (lcov.info) not found"
            exit 1
          fi
          echo "Frontend coverage report verified"
        working-directory: frontend

      - name: Frontend — SonarCloud analysis
        id: sonar-frontend
        run: |
          set -euo pipefail
          npx sonar-scanner \
            -Dsonar.projectKey=demo-ms-frontend \
            -Dsonar.organization="${{ vars.SONAR_ORG }}" \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.sources=src \
            -Dsonar.tests=src \
            -Dsonar.test.inclusions="**/*.test.ts,**/*.test.tsx" \
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info \
            -Dsonar.qualitygate.wait=true
        working-directory: frontend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # ── Artifacts ────────────────────

      - name: Upload backend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco

      - name: Upload frontend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage

  quality-gate:
    name: Quality Gate Check (Fail-Fast)
    needs: test-quality
    runs-on: ubuntu-latest
    steps:
      - name: SonarCloud Quality Gate — Backend
        id: qg-backend
        uses: sonarsource/sonarqube-quality-gate-action@v1
        with:
          projectKey: demo-ms-backend
          organization: ${{ vars.SONAR_ORG }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        timeout-minutes: 5

      - name: Fail on backend quality gate failure
        if: failure() && steps.qg-backend.outcome == 'failure'
        run: |
          echo "============================================"
          echo " FAIL-FAST: Backend Quality Gate REJECTED"
          echo " El pipeline se detiene aquí."
          echo " Razón: cobertura < 80%, bugs críticos,"
          echo " o vulnerabilidades de seguridad detectadas."
          echo "============================================"
          exit 1

      - name: SonarCloud Quality Gate — Frontend
        id: qg-frontend
        uses: sonarsource/sonarqube-quality-gate-action@v1
        with:
          projectKey: demo-ms-frontend
          organization: ${{ vars.SONAR_ORG }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        timeout-minutes: 5

      - name: Fail on frontend quality gate failure
        if: failure() && steps.qg-frontend.outcome == 'failure'
        run: |
          echo "============================================"
          echo " FAIL-FAST: Frontend Quality Gate REJECTED"
          echo " El pipeline se detiene aquí."
          echo " Razón: cobertura insuficiente, bugs o"
          echo " vulnerabilidades de seguridad detectadas."
          echo "============================================"
          exit 1

      - name: Quality Gate Summary
        if: always()
        run: |
          echo "::notice::Todos los Quality Gates pasaron exitosamente. Procediendo con security scan."

  security-scan:
    name: Security Scan (Snyk + Trivy)
    needs: quality-gate
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      # ── Snyk: Dependencies ───────────

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Resolve Maven dependencies
        run: |
          set -euo pipefail
          mvn dependency:resolve -B -q

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Snyk — Backend vulnerability scan
        id: snyk-backend
        run: |
          set -euo pipefail
          snyk test \
            --all-projects \
            --severity-threshold=high \
            --policy-path=.snyk \
            --json-file-output=snyk-backend-report.json || true
          if [ -f snyk-backend-report.json ]; then
            VULN_COUNT=$(python3 -c "
          import json
          with open('snyk-backend-report.json') as f:
              data = json.load(f)
          count = 0
          if isinstance(data, list):
              for item in data:
                  count += len(item.get('vulnerabilities', []))
          elif isinstance(data, dict):
              for item in data.values():
                  count += len(item.get('vulnerabilities', []))
          print(count)
          " 2>/dev/null || echo 0)
            echo "Snyk found ${VULN_COUNT} high/critical vulnerabilities in backend dependencies"
          fi
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk — Fail on critical findings
        run: |
          set -euo pipefail
          snyk test \
            --all-projects \
            --severity-threshold=high \
            --policy-path=.snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Upload Snyk report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-report
          path: snyk-backend-report.json

  build-push:
    name: Build, Scan & Push to ECR
    needs: security-scan
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # ── Backend image ────────────────

      - name: Build backend image (no push yet)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: demo-ms-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy — Scan backend image
        id: trivy-backend
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: demo-ms-backend:ci
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          timeout: 5m

      - name: Trivy — Generate backend SBOM
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: demo-ms-backend:ci
          format: cyclonedx
          output: trivy-backend-sbom.json
        continue-on-error: true

      - name: Upload backend SBOM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-backend-sbom
          path: trivy-backend-sbom.json

      # ── Frontend image ───────────────

      - name: Build frontend image (no push yet)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          load: true
          tags: demo-ms-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy — Scan frontend image
        id: trivy-frontend
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: demo-ms-frontend:ci
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          timeout: 5m

      - name: Trivy — Generate frontend SBOM
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: demo-ms-frontend:ci
          format: cyclonedx
          output: trivy-frontend-sbom.json
        continue-on-error: true

      - name: Upload frontend SBOM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-frontend-sbom
          path: trivy-frontend-sbom.json

      - name: Trivy Scan Results
        if: always()
        run: |
          if [ "${{ steps.trivy-backend.outcome }}" = "failure" ]; then
            echo "::error::FAIL-FAST: Trivy detected CRITICAL or HIGH vulnerabilities in backend image. Pipeline blocked."
          fi
          if [ "${{ steps.trivy-frontend.outcome }}" = "failure" ]; then
            echo "::error::FAIL-FAST: Trivy detected CRITICAL or HIGH vulnerabilities in frontend image. Pipeline blocked."
          fi

      # ── Push to ECR (only if Trivy passed) ──

      - name: Push backend image to ECR
        if: steps.trivy-backend.outcome != 'failure' && steps.trivy-frontend.outcome != 'failure'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_BACKEND }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_BACKEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push frontend image to ECR
        if: steps.trivy-backend.outcome != 'failure' && steps.trivy-frontend.outcome != 'failure'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_FRONTEND }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_FRONTEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-ec2:
    name: Deploy to EC2 (Docker Compose)
    needs: build-push
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE }}

      - name: Get EC2 public IP
        id: ec2-ip
        run: |
          set -euo pipefail
          IP=$(aws ec2 describe-instances \
            --region "${{ env.AWS_REGION }}" \
            --filters "Name=tag:Name,Values=greeting-ec2-ep3" "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          if [ -z "$IP" ] || [ "$IP" = "None" ]; then
            echo "::error::No EC2 instance found with tag Name=greeting-ec2-ep3"
            exit 1
          fi
          echo "ip=$IP" >> $GITHUB_OUTPUT
          echo "EC2 public IP: $IP"

      - name: Deploy via SSH (Docker Compose)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ steps.ec2-ip.outputs.ip }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd /home/ec2-user/Devops-Ev-II

            echo "=== Pulling latest code ==="
            git checkout main
            git pull origin main

            echo "=== Stopping old containers ==="
            docker compose down --remove-orphans || true

            echo "=== Building and starting services ==="
            docker compose up -d --build

            echo "=== Waiting for health checks ==="
            sleep 20
            docker compose ps

            echo "=== Verifying services ==="
            curl -fsS -o /dev/null -w "Frontend: HTTP %{http_code}\n" http://localhost:80/health
            curl -fsS http://localhost:8080/actuator/health | python3 -m json.tool
            echo "All services healthy"

      - name: Verify services from GitHub Actions
        run: |
          set -euo pipefail
          IP="${{ steps.ec2-ip.outputs.ip }}"
          echo "Verifying frontend..."
          curl -fsS -o /dev/null -w "Frontend: HTTP %{http_code}\n" "http://$IP/health"
          echo "Verifying backend..."
          curl -fsS "http://$IP:8080/actuator/health" | python3 -m json.tool
          echo "Verifying API..."
          curl -fsS -X POST "http://$IP/api/v1/greetings?name=CI-CD-Deploy" | grep "Hola DevOps V4"
          echo "Verifying Prometheus..."
          curl -fsS "http://$IP:8080/actuator/prometheus" | grep -q "jvm_memory_used_bytes" && echo "Metrics OK"

      - name: Publish deploy metrics to CloudWatch
        run: |
          DEPLOY_END=$(date +%s)
          DEPLOY_DURATION=$(( DEPLOY_END - $(date -d "${{ github.run_started_at }}" +%s) ))
          aws cloudwatch put-metric-data \
            --namespace "GreetingService/CICD" \
            --metric-name "DeployDurationSeconds" \
            --value "$DEPLOY_DURATION" \
            --unit Seconds \
            --region "${{ env.AWS_REGION }}" \
            --dimensions "Pipeline=EP3,Service=FullStack" || true
          echo "Deploy duration: ${DEPLOY_DURATION}s"

  smoke-tests:
    name: Smoke Tests
    needs: deploy-ec2
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE }}

      - name: Get EC2 public IP
        id: ec2-ip
        run: |
          set -euo pipefail
          IP=$(aws ec2 describe-instances \
            --region "${{ env.AWS_REGION }}" \
            --filters "Name=tag:Name,Values=greeting-ec2-ep3" "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          echo "ip=$IP" >> $GITHUB_OUTPUT
          echo "Target EC2: $IP"

      - name: Smoke — Frontend health
        id: smoke-frontend
        run: |
          curl -fsS -o /dev/null -w "%{http_code}" http://${{ steps.ec2-ip.outputs.ip }}/health | grep -q 200 || {
            echo "::error::SMOKE FAILED: Frontend /health not 200"
            exit 1
          }

      - name: Smoke — Backend health
        id: smoke-backend
        run: |
          curl -fsS http://${{ steps.ec2-ip.outputs.ip }}:8080/actuator/health | grep -q UP || {
            echo "::error::SMOKE FAILED: Backend /actuator/health not UP"
            exit 1
          }

      - name: Smoke — Create greeting
        id: smoke-create
        run: |
          curl -fsS -X POST "http://${{ steps.ec2-ip.outputs.ip }}/api/v1/greetings?name=EP3-Smoke" | grep -q "Hola DevOps V4" || {
            echo "::error::SMOKE FAILED: POST /api/v1/greetings unexpected response"
            exit 1
          }
          echo "SMOKE PASSED: Greeting created"

      - name: Smoke — Prometheus metrics
        id: smoke-metrics
        run: |
          curl -fsS http://${{ steps.ec2-ip.outputs.ip }}:8080/actuator/prometheus | grep -q "jvm_memory_used_bytes" || {
            echo "::error::SMOKE FAILED: /actuator/prometheus not exposing metrics"
            exit 1
          }
          echo "SMOKE PASSED: Prometheus metrics exposed"

      - name: Smoke — Frontend serves HTML
        id: smoke-html
        run: |
          curl -fsS http://${{ steps.ec2-ip.outputs.ip }}/ | grep -q "<title>" || {
            echo "::error::SMOKE FAILED: Frontend not serving HTML"
            exit 1
          }
          echo "SMOKE PASSED: Frontend serving HTML"

      - name: Publish smoke test metrics to CloudWatch
        if: always()
        run: |
          PASS_COUNT=0
          for step in smoke-frontend smoke-backend smoke-create smoke-metrics smoke-html; do
            if [ "${{ steps[step].outcome }}" = "success" ]; then
              PASS_COUNT=$((PASS_COUNT + 1))
            fi
          done
          aws cloudwatch put-metric-data \
            --namespace "GreetingService/CICD" \
            --metric-name "SmokeTestsPassed" \
            --value "$PASS_COUNT" \
            --unit Count \
            --region "${{ env.AWS_REGION }}"
