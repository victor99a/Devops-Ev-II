name: CI/CD Pipeline — EP3 Full-Stack (EC2 + Docker Compose)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  JAVA_VERSION: "21"
  SONAR_ORG: victor99a
  SONAR_HOST: https://sonarcloud.io

permissions:
  id-token: write
  contents: read

defaults:
  run:
    shell: bash -euo pipefail {0}

jobs:

  # ═══════════════════════════════════════════════════════
  # ETAPA 1: Test & Quality (Backend + Frontend)
  # Integra SonarCloud con qualitygate.wait=true
  # ═══════════════════════════════════════════════════════

  test-quality:
    name: Test & Quality (Backend + Frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Backend (Java / Maven) ──────────────────────

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Backend — Maven verify (tests + JaCoCo + SonarCloud)
        id: backend-tests
        run: |
          set -euo pipefail
          mvn verify sonar:sonar \
            -B \
            -Dsonar.projectKey=victor99a_Devops-Ev-II \
            -Dsonar.organization="${{ env.SONAR_ORG }}" \
            -Dsonar.host.url="${{ env.SONAR_HOST }}" \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml \
            -Dsonar.java.binaries=target/classes \
            -Dsonar.sources=src/main/java \
            -Dsonar.tests=src/test/java \
            -Dsonar.qualitygate.wait=true \
            -Dsonar.token="${{ secrets.SONAR_TOKEN }}"
        working-directory: .
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Backend — Verify JaCoCo coverage threshold
        run: |
          set -euo pipefail
          COVERAGE_FILE="target/site/jacoco/jacoco.xml"
          if [ ! -f "$COVERAGE_FILE" ]; then
            echo "::error::JaCoCo report not found at $COVERAGE_FILE"
            exit 1
          fi
          echo "JaCoCo report verified"

      # ── Frontend (React / TypeScript) ────────────────

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend — Install dependencies
        run: |
          set -euo pipefail
          npm ci --legacy-peer-deps
        working-directory: frontend

      - name: Frontend — Lint (TypeScript strict check)
        id: frontend-lint
        run: |
          set -euo pipefail
          npm run lint
        working-directory: frontend

      - name: Frontend — Tests with coverage (Vitest)
        id: frontend-tests
        run: |
          set -euo pipefail
          npm test -- --coverage --reporter=verbose
        working-directory: frontend

      - name: Frontend — Verify coverage report
        run: |
          set -euo pipefail
          if [ ! -f "coverage/lcov.info" ]; then
            echo "::warning::lcov.info not found, checking alternative paths..."
            ls -la coverage/ 2>/dev/null || echo "No coverage dir"
          else
            echo "Coverage report (lcov.info) found"
          fi
        working-directory: frontend

      # SonarCloud solo backend. Fail-fast integrado via qualitygate.wait=true

      # ── Artifacts ────────────────────────────────────

      - name: Upload backend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco

      - name: Upload frontend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage

  # ═══════════════════════════════════════════════════════
  # ETAPA 2: Quality Gate Check (FAIL-FAST)
  # Si SonarCloud detecta bugs, vulnerabilidades o
  # cobertura insuficiente, el pipeline se detiene aquí
  # ═══════════════════════════════════════════════════════

  security-scan:
    name: Security Scan (Snyk)
    needs: test-quality
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Resolve Maven dependencies
        run: |
          set -euo pipefail
          mvn dependency:resolve -B -q

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Snyk — Vulnerability scan
        id: snyk
        run: |
          set -euo pipefail
          snyk test \
            --all-projects \
            --severity-threshold=high \
            --policy-path=.snyk || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
