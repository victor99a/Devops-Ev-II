name: CI/CD Pipeline

on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  JAVA_VERSION: "21"

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Resolve Maven dependencies
        run: mvn dependency:resolve -B -q

      - name: Build Application
        run: mvn clean package -B

      - name: Archive application JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  security:
    name: Security Scan (Snyk)
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Resolve Maven dependencies
        run: mvn dependency:resolve -B -q

      - name: Install Snyk CLI via NPM
        run: npm install -g snyk

      - name: Run Snyk vulnerability scan
        run: |
          snyk test \
            --all-projects \
            --severity-threshold=high \
            --policy-path=.snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  deploy:
    name: Deploy
    needs: security
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: demo-ms:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start service with Docker Compose
        run: docker compose up -d

      - name: Tear down
        if: always()
        run: docker compose down -v

  sync-local:
    name: Sync & Redeploy Local
    needs: deploy
    if: github.event_name != 'pull_request'
    runs-on: self-hosted
    steps:
      - name: Pull latest from main
        run: |
          cd $HOME/Duoc/Devops/demo-ms
          git pull origin main

      - name: Redeploy with Docker Compose (si Docker esta corriendo)
        continue-on-error: true
        env:
          DOCKER_CONFIG: /tmp/docker-config-no-keychain
        run: |
          mkdir -p $DOCKER_CONFIG
          echo '{"credsStore":""}' > $DOCKER_CONFIG/config.json
          cd $HOME/Duoc/Devops/demo-ms
          if docker info >/dev/null 2>&1; then
            docker compose up -d --build
          else
            echo "Docker no esta corriendo. Solo se hizo git pull."
            echo "Ejecuta manualmente: docker compose up -d --build"
          fi
