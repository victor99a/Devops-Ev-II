name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  JAVA_VERSION: "21"
  MAVEN_OPTS: "-Dmaven.repo.local=${{ github.workspace }}/.m2/repository"

jobs:

  build-and-test:
    name: Build, Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build, Test & Verify (JaCoCo gate)
        run: mvn clean verify -B

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/

      - name: Archive JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: Archive application JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  security:
    name: Security Scan (Snyk)
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Snyk vulnerability scan
        uses: snyk/actions/maven@master
        continue-on-error: false
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: >
            --severity-threshold=high
            --all-projects
            --policy-path=.snyk

  deploy:
    name: Deploy & Validate
    needs: security
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: demo-ms:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start service with Docker Compose
        run: docker compose up -d --wait

      - name: Validate health endpoint
        run: |
          echo "=== Validating actuator health ==="
          for i in $(seq 1 20); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/actuator/health || echo "000")
            echo "  Attempt $i: HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ]; then
              curl -s http://localhost:8080/actuator/health | python3 -m json.tool
              break
            fi
            sleep 3
          done
          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: /actuator/health did not return 200 after 20 attempts"
            docker compose logs
            exit 1
          fi

      - name: Validate greeting endpoint
        run: |
          echo "=== Validating GET /api/v1/greeting ==="
          curl -fsS http://localhost:8080/api/v1/greeting | python3 -m json.tool

          echo ""
          echo "=== Validating GET /api/v1/greeting?name=DevOps ==="
          curl -fsS "http://localhost:8080/api/v1/greeting?name=DevOps" | python3 -m json.tool

      - name: Validate container health
        run: |
          echo "=== Docker container status ==="
          docker ps -a --filter name=demo-ms --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

          HEALTH_STATUS=$(docker inspect --format='{{.State.Health.Status}}' demo-ms 2>/dev/null)
          echo ""
          echo "Health status: $HEALTH_STATUS"

          if [ "$HEALTH_STATUS" != "healthy" ]; then
            echo "ERROR: Container health check failed (status: $HEALTH_STATUS)"
            docker compose logs
            exit 1
          fi

      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== Docker Compose Logs ==="
          docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
